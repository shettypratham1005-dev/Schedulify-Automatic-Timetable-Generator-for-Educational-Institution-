<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batches - Timetable Generator</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Timetable Generator</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="/html/dashboard.html">Dashboard</a>
            <a href="/html/departments.html">Departments</a>
            <a href="/html/subjects.html">Subjects</a>
            <a href="/html/faculty.html">Faculty</a>
            <a href="/html/classrooms.html">Classrooms</a>
            <a href="/html/batches.html" class="active">Batches</a>
            <a href="/html/generate.html">Generate Timetable</a>
            <a href="/html/view-timetable.html">View Timetable</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
    </div>
    
    <div class="main-content">
        <header class="top-header">
            <h1>Manage Batches</h1>
        </header>
        
        <div class="content">
            <div class="form-section">
                <h2>Add New Batch</h2>
                <form id="batchForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="batchName">Batch Name</label>
                            <input type="text" id="batchName" name="name" required placeholder="e.g., Batch A">
                        </div>
                        <div class="form-group">
                            <label for="batchDept">Department</label>
                            <select id="batchDept" name="department" required>
                                <option value="">Select Department</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="batchYear">Year</label>
                            <select id="batchYear" name="year" required>
                                <option value="">Select Year</option>
                                <option value="SE">SE</option>
                                <option value="TE">TE</option>
                                <option value="BE">BE</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="batchActive">Active</label>
                            <select id="batchActive" name="isActive">
                                <option value="true">Yes</option>
                                <option value="false">No</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">Add Batch</button>
                    </div>
                </form>
            </div>
            
            <div class="list-section">
                <h2>Existing Batches</h2>
                <table id="batchesTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Year</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Batches will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
