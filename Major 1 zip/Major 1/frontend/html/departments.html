<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - Timetable Generator</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Timetable Generator</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="/html/dashboard.html">Dashboard</a>
            <a href="/html/departments.html" class="active">Departments</a>
            <a href="/html/subjects.html">Subjects</a>
            <a href="/html/faculty.html">Faculty</a>
            <a href="/html/classrooms.html">Classrooms</a>
            <a href="/html/batches.html">Batches</a>
            <a href="/html/generate.html">Generate Timetable</a>
            <a href="/html/view-timetable.html">View Timetable</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
    </div>
    
    <div class="main-content">
        <header class="top-header">
            <h1>Manage Departments</h1>
        </header>
        
        <div class="content">
            <div class="form-section">
                <h2>Add New Department</h2>
                <form id="departmentForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="deptName">Department Code (EXTC/VLSI)</label>
                            <input type="text" id="deptName" name="name" required placeholder="e.g., EXTC">
                        </div>
                        <div class="form-group">
                            <label for="deptFullName">Full Name</label>
                            <input type="text" id="deptFullName" name="fullName" required placeholder="e.g., Electronics and Telecommunication">
                        </div>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">Add Department</button>
                    </div>
                </form>
            </div>
            
            <div class="list-section">
                <h2>Existing Departments</h2>
                <table id="departmentsTable">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Full Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Departments will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
