<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects - Timetable Generator</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Timetable Generator</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="/html/dashboard.html">Dashboard</a>
            <a href="/html/departments.html">Departments</a>
            <a href="/html/subjects.html" class="active">Subjects</a>
            <a href="/html/faculty.html">Faculty</a>
            <a href="/html/classrooms.html">Classrooms</a>
            <a href="/html/batches.html">Batches</a>
            <a href="/html/generate.html">Generate Timetable</a>
            <a href="/html/view-timetable.html">View Timetable</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
    </div>
    
    <div class="main-content">
        <header class="top-header">
            <h1>Manage Subjects</h1>
        </header>
        
        <div class="content">
            <div class="form-section">
                <h2>Add New Subject</h2>
                <form id="subjectForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="subjectName">Subject Name</label>
                            <input type="text" id="subjectName" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="subjectCode">Subject Code</label>
                            <input type="text" id="subjectCode" name="code" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="subjectDept">Department</label>
                            <select id="subjectDept" name="department" required>
                                <option value="">Select Department</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="subjectYear">Year</label>
                            <select id="subjectYear" name="year" required>
                                <option value="">Select Year</option>
                                <option value="SE">SE</option>
                                <option value="TE">TE</option>
                                <option value="BE">BE</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="isLab">Is Lab Subject?</label>
                            <select id="isLab" name="isLab">
                                <option value="false">No - Lecture</option>
                                <option value="true">Yes - Lab</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="lecturesPerWeek">Lectures Per Week</label>
                            <input type="number" id="lecturesPerWeek" name="lecturesPerWeek" value="4" min="1" max="10">
                        </div>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">Add Subject</button>
                    </div>
                </form>
            </div>
            
            <div class="list-section">
                <h2>Existing Subjects</h2>
                <table id="subjectsTable">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Year</th>
                            <th>Type</th>
                            <th>Lectures/Week</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Subjects will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
